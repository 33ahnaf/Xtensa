[platformio]
build_cache_dir = .pio/build_cache

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino

; build_flags = -O2, -ccache
build_flags =
    -O2
    -D IDF_CCACHE_ENABLE=1

build_src_filter = -<*> +<Music_Streamer>

lib_ldf_mode = chain
build_type = debug

monitor_speed = 115200
monitor_filters =
    send_on_enter
    esp32_exception_decoder
monitor_echo = yes

upload_speed = 921600
board_build.f_flash = 80000000L
board_build.flash_mode = qio

