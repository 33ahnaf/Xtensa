<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --hot-pink: #ff2e97;
            --soft-pink: #ffe4f1;
            --dark-pink: #831843;
            --hover-pink: #e61e82;
        }

        body {
            background: #ff85c1; /* Saturated, cozy pink */
            background: radial-gradient(circle, #ffaddb 0%, #ff85c1 100%);
            color: var(--dark-pink);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(131, 24, 67, 0.2);
            backdrop-filter: blur(10px);
        }

        h2 { font-weight: 800; margin-bottom: 25px; }

        /* The "Converter Style" Drop Zone */
        .drop-zone {
            border: 4px dashed var(--hot-pink);
            background: var(--soft-pink);
            border-radius: 25px;
            padding: 50px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            margin-bottom: 20px;
        }

        .drop-zone:hover, .drop-zone.dragover {
            background: #ffd1e8;
            transform: scale(1.02);
            border-style: solid;
        }

        .drop-zone p { font-weight: bold; margin: 0; pointer-events: none; }
        
        #file { display: none; } /* Hide the ugly default input */

        button {
            background: var(--hot-pink);
            font-weight: bold;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 46, 151, 0.3);
            width: 100%;
        }

        button:hover {
            background: var(--hover-pink);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 46, 151, 0.4);
        }

        .progress {
            width: 100%;
            background: #eee;
            border-radius: 20px;
            margin-top: 25px;
            height: 12px;
            overflow: hidden;
            display: none; /* Hidden until upload starts */
        }

        .bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff2e97, #ff85c1);
            border-radius: 20px;
            transition: width 0.3s;
        }

        #status { font-size: 14px; margin-top: 10px; font-weight: 600; }

        .disconnect {
            margin-top: 20px;
            background: transparent;
            color: #ff2e97;
            border: 2px solid #ff2e97;
            padding: 10px;
            font-size: 14px;
        }
        
        .disconnect:hover { background: #ff2e97; color: white; }
    </style>
</head>

<body>
    <div class="card">
        <h2>Music Streamer</h2>
        
        <!-- Clickable Drop Zone -->
        <div class="drop-zone" onclick="document.getElementById('file').click()" id="drop-zone">
            <p id="file-name">✨ Drop your .WAV here or Click ✨</p>
            <input type="file" id="file" accept=".wav" onchange="updateFileName()">
        </div>

        <button onclick="upload()">Upload Now</button>

        <div class="progress" id="progress-container">
            <div class="bar" id="bar"></div>
        </div>
        <p id="status"></p>

        <button class="disconnect" onclick="disconnect()">Disconnect Stream</button>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file');

        // Update name when file is picked
        function updateFileName() {
            const name = fileInput.files[0] ? fileInput.files[0].name : "✨ Drop your .WAV here or Click ✨";
            document.getElementById('file-name').innerText = name;
        }

        // Drag and Drop Visuals
        ['dragover', 'dragleave', 'drop'].forEach(evt => {
            dropZone.addEventListener(evt, e => {
                e.preventDefault();
                if (evt === 'dragover') dropZone.classList.add('dragover');
                else dropZone.classList.remove('dragover');
            });
        });

        dropZone.addEventListener('drop', e => {
            fileInput.files = e.dataTransfer.files;
            updateFileName();
        });

        function upload() {
            let file = fileInput.files[0];
            if (!file) return;

            document.getElementById("progress-container").style.display = "block";
            let xhr = new XMLHttpRequest();
            let formData = new FormData();
            formData.append("data", file);

            xhr.upload.onprogress = function(e){
                if(e.lengthComputable){
                    let p = (e.loaded / e.total) * 100;
                    document.getElementById("bar").style.width = p + "%";
                    document.getElementById("status").innerText = "Sending magic... " + p.toFixed(1) + "%";
                }
            };

            xhr.onload = function(){
                document.getElementById("status").innerText = "Upload complete! 🌸";
                setTimeout(() => {
                    document.getElementById("progress-container").style.display = "none";
                    document.getElementById("bar").style.width = "0%";
                }, 2000);
            };

            xhr.open("POST", "/upload", true);
            xhr.send(formData);
        }

        function disconnect(){ fetch("/disconnect"); }
    </script>
</body>
</html>
